name: Build-OpenWrt-fastfetch

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release 版本号（留空则使用 version.mk 中的版本）'
        required: false
        default: ''
      text:
        description: '请填写发布的说明'
        required: false
        default: ''
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: write
jobs:
  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_cortex-a53
          - aarch64_generic
          - x86_64

        sdk:
          - 24.10.6
          - 25.12.3

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache OpenWrt SDK
        uses: actions/cache@v5
        with:
          path: |
            /opt/openwrt-sdk-${{ matrix.arch }}-${{ matrix.sdk }}
            dl
          key: sdk-${{ matrix.arch }}-${{ matrix.sdk }}

      - name: Building packages
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: fastfetch
          NO_REFRESH_CHECK: 1
          NO_SHFMT_CHECK: 1
          MAKEFLAGS: -j$(nproc)
          V: s

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.arch }}-${{ matrix.sdk }}
          path: bin/packages/${{ matrix.arch }}/packages_ci/*

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Determine release tag
        id: tag
        run: |
          VERSION=$(grep -oP 'FASTFETCH_VERSION=\K[0-9.]+' fastfetch/version.mk)
          INPUT_TAG="${{ github.event.inputs.tag }}"
          TAG="${INPUT_TAG:-$VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG (version.mk: $VERSION)"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release info
        run: |
          sudo timedatectl set-timezone "Asia/Shanghai"
          mkdir -p release
          for dir in artifacts/*; do
            name=$(basename "$dir")
            zip -j "release/fastfetch-${{ steps.tag.outputs.tag }}-${name}.zip" "$dir"/*.ipk "$dir"/*.apk 2>/dev/null || true
          done
          echo "build_time=$(TZ=UTC-8 date '+%Y年%m月%d日%H:%M:%S' | jq -sRr @uri)" >> "$GITHUB_ENV"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
            token: ${{ secrets.GITHUB_TOKEN }}
            body: |

             > ### ![](https://img.shields.io/badge/%E7%BC%96%E8%AF%91%E6%97%B6%E9%97%B4-${{ env.build_time }}-fastfetch?logo=github&labelColor=%E9%A1%BB)![](https://img.shields.io/github/downloads/${{ github.repository }}/${{ steps.tag.outputs.tag }}/total?label=%E4%B8%8B%E8%BD%BD%E6%AC%A1%E6%95%B0&logo=github)

             - 其中 **`24.10.x`** 里面是ipk安装包 **`25.12.x`** 里面是apk安装包 **`仅包含fastfetch`**

             - **`*.apk` 是OpenWrt新版的APK包** 对于apk包跳过证书命令
             `apk add --allow-untrusted fastfetch.apk`

             ${{ github.event.inputs.text }}

            tag_name: ${{ steps.tag.outputs.tag }}
            files: release/*.zip
